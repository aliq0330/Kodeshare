<!doctype html>
<html lang="tr" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      // GitHub Pages SPA: restore path encoded by 404.html
      (function () {
        var p = window.location.search.match(/[?&]p=([^&]+)/)
        if (p) {
          var path = decodeURIComponent(p[1])
          var q = path.match(/&q=(.*)/)
          window.history.replaceState(
            null, null,
            window.location.pathname.split('/').slice(0, -1).join('/') + '/' +
            path.replace(/&q=.*/, '') + (q ? '?' + q[1] : '') + window.location.hash
          )
        }
      })()
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Kodeshare — Kod yaz, paylaş, keşfet." />
    <title>Kodeshare</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-surface text-white antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
